<svg width="980" height="700" viewBox="0 0 980 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="M35 Chen ER Diagram">
  <defs>
    <style>
      .title { font: 700 18px Arial, sans-serif; fill: #111827; }
      .entity { fill: #f8fafc; stroke: #334155; stroke-width: 1.6; rx: 8; }
      .ename { font: 700 14px Arial, sans-serif; fill: #0f172a; }
      .attr { fill: #ffffff; stroke: #475569; stroke-width: 1.3; }
      .attrText { font: 11.5px Arial, sans-serif; fill: #0f172a; }
      .pk { text-decoration: underline; font-weight: 700; }
      .fk { font-weight: 700; fill: #1d4ed8; }
      .rel { fill: #eef2ff; stroke: #4338ca; stroke-width: 1.4; }
      .relText { font: 700 11px Arial, sans-serif; fill: #1f2937; }
      .edge-total { stroke: #111827; stroke-width: 2.8; fill: none; }
      .edge-partial { stroke: #111827; stroke-width: 1.4; stroke-dasharray: 5 4; fill: none; }
      .card { font: 700 11px Arial, sans-serif; fill: #111827; }
      .legend { font: 11px Arial, sans-serif; fill: #111827; }
    </style>
  </defs>

  <text x="300" y="28" class="title">Module 35 ER Diagram (Chen Notation, PK/FK, Cardinality, Participation)</text>

  <!-- Entities (names only) -->
  <rect x="60" y="250" width="120" height="48" class="entity"/>
  <text x="84" y="279" class="ename">PATIENT</text>

  <rect x="430" y="90" width="120" height="48" class="entity"/>
  <text x="455" y="119" class="ename">THERAPY</text>

  <rect x="770" y="250" width="145" height="48" class="entity"/>
  <text x="790" y="279" class="ename">SIDE_EFFECT</text>

  <rect x="250" y="470" width="130" height="48" class="entity"/>
  <text x="278" y="499" class="ename">RESPONSE</text>

  <rect x="600" y="470" width="175" height="48" class="entity"/>
  <text x="628" y="499" class="ename">COST_ANALYSIS</text>

  <!-- Relationships -->
  <polygon points="235,274 275,244 315,274 275,304" class="rel"/>
  <text x="247" y="278" class="relText">UNDERGOES</text>

  <polygon points="630,190 670,160 710,190 670,220" class="rel"/>
  <text x="652" y="194" class="relText">CAUSES</text>

  <polygon points="420,325 465,295 510,325 465,355" class="rel"/>
  <text x="429" y="329" class="relText">HAS_RESPONSE</text>

  <polygon points="565,325 610,295 655,325 610,355" class="rel"/>
  <text x="575" y="329" class="relText">EVALUATED_BY</text>

  <!-- Relationship edges with cardinality + participation -->
  <!-- PATIENT M:N THERAPY -->
  <line x1="180" y1="274" x2="235" y2="274" class="edge-partial"/>
  <line x1="315" y1="274" x2="430" y2="130" class="edge-partial"/>
  <text x="190" y="258" class="card">M (Partial)</text>
  <text x="325" y="240" class="card">N (Partial)</text>

  <!-- THERAPY 1:N SIDE_EFFECT -->
  <line x1="550" y1="120" x2="630" y2="190" class="edge-partial"/>
  <line x1="710" y1="190" x2="770" y2="260" class="edge-total"/>
  <text x="560" y="132" class="card">1 (Partial)</text>
  <text x="718" y="212" class="card">N (Total)</text>

  <!-- THERAPY 1:N RESPONSE -->
  <line x1="490" y1="138" x2="465" y2="295" class="edge-partial"/>
  <line x1="420" y1="325" x2="350" y2="470" class="edge-total"/>
  <text x="498" y="220" class="card">1 (Partial)</text>
  <text x="380" y="392" class="card">N (Total)</text>

  <!-- THERAPY 1:1 COST_ANALYSIS -->
  <line x1="520" y1="138" x2="610" y2="295" class="edge-partial"/>
  <line x1="655" y1="325" x2="690" y2="470" class="edge-total"/>
  <text x="550" y="220" class="card">1 (Partial)</text>
  <text x="662" y="396" class="card">1 (Total)</text>

  <!-- Attributes: PATIENT (ellipses) -->
  <ellipse cx="75" cy="200" rx="68" ry="18" class="attr"/>
  <text x="29" y="204" class="attrText"><tspan class="pk">patient_id</tspan> : UUID</text>
  <line x1="92" y1="218" x2="100" y2="250" class="edge-partial"/>

  <ellipse cx="190" cy="200" rx="78" ry="18" class="attr"/>
  <text x="140" y="204" class="attrText">patient_name : VARCHAR</text>
  <line x1="175" y1="218" x2="145" y2="250" class="edge-partial"/>

  <ellipse cx="45" cy="330" rx="45" ry="16" class="attr"/>
  <text x="31" y="334" class="attrText">age</text>
  <line x1="90" y1="330" x2="60" y2="300" class="edge-partial"/>

  <ellipse cx="130" cy="350" rx="55" ry="16" class="attr"/>
  <text x="98" y="354" class="attrText">gender</text>
  <line x1="145" y1="334" x2="130" y2="300" class="edge-partial"/>

  <!-- Attributes: THERAPY -->
  <ellipse cx="430" cy="48" rx="70" ry="17" class="attr"/>
  <text x="384" y="52" class="attrText"><tspan class="pk">therapy_id</tspan> : UUID</text>
  <line x1="448" y1="65" x2="460" y2="90" class="edge-partial"/>

  <ellipse cx="550" cy="48" rx="88" ry="17" class="attr"/>
  <text x="501" y="52" class="attrText">therapy_name : VARCHAR</text>
  <line x1="545" y1="65" x2="520" y2="90" class="edge-partial"/>

  <ellipse cx="595" cy="95" rx="78" ry="17" class="attr"/>
  <text x="551" y="99" class="attrText">therapy_type : VARCHAR</text>
  <line x1="560" y1="105" x2="550" y2="112" class="edge-partial"/>

  <!-- Attributes: SIDE_EFFECT -->
  <ellipse cx="760" cy="200" rx="80" ry="17" class="attr"/>
  <text x="706" y="204" class="attrText"><tspan class="pk">side_effect_id</tspan> : UUID</text>
  <line x1="780" y1="217" x2="800" y2="250" class="edge-partial"/>

  <ellipse cx="935" cy="200" rx="86" ry="17" class="attr"/>
  <text x="876" y="204" class="attrText">adverse_event : VARCHAR</text>
  <line x1="918" y1="217" x2="880" y2="250" class="edge-partial"/>

  <ellipse cx="950" cy="245" rx="86" ry="17" class="attr"/>
  <text x="896" y="249" class="attrText">toxicity_grade : INT</text>
  <line x1="864" y1="245" x2="915" y2="275" class="edge-partial"/>

  <ellipse cx="948" cy="290" rx="95" ry="17" class="attr"/>
  <text x="885" y="294" class="attrText">tolerability_level : VARCHAR</text>
  <line x1="853" y1="288" x2="915" y2="290" class="edge-partial"/>

  <ellipse cx="802" cy="330" rx="80" ry="17" class="attr"/>
  <text x="744" y="334" class="attrText"><tspan class="fk">therapy_id (FK)</tspan> : UUID</text>
  <line x1="802" y1="313" x2="835" y2="298" class="edge-partial"/>

  <ellipse cx="710" cy="290" rx="78" ry="17" class="attr"/>
  <text x="654" y="294" class="attrText"><tspan class="fk">patient_id (FK)</tspan> : UUID</text>
  <line x1="725" y1="275" x2="785" y2="285" class="edge-partial"/>

  <!-- Attributes: RESPONSE -->
  <ellipse cx="210" cy="435" rx="72" ry="17" class="attr"/>
  <text x="160" y="439" class="attrText"><tspan class="pk">response_id</tspan> : UUID</text>
  <line x1="240" y1="448" x2="265" y2="470" class="edge-partial"/>

  <ellipse cx="125" cy="480" rx="72" ry="17" class="attr"/>
  <text x="73" y="484" class="attrText"><tspan class="fk">patient_id (FK)</tspan> : UUID</text>
  <line x1="197" y1="480" x2="250" y2="488" class="edge-partial"/>

  <ellipse cx="145" cy="525" rx="72" ry="17" class="attr"/>
  <text x="93" y="529" class="attrText"><tspan class="fk">therapy_id (FK)</tspan> : UUID</text>
  <line x1="217" y1="525" x2="250" y2="510" class="edge-partial"/>

  <ellipse cx="315" cy="560" rx="108" ry="18" class="attr"/>
  <text x="239" y="564" class="attrText">clinical_improvement : DECIMAL(5,2)</text>
  <line x1="315" y1="542" x2="315" y2="518" class="edge-partial"/>

  <ellipse cx="455" cy="560" rx="94" ry="18" class="attr"/>
  <text x="394" y="564" class="attrText">symptom_relief : DECIMAL(5,2)</text>
  <line x1="410" y1="545" x2="360" y2="518" class="edge-partial"/>

  <ellipse cx="500" cy="520" rx="96" ry="18" class="attr"/>
  <text x="438" y="524" class="attrText">survival_outcome : INT</text>
  <line x1="404" y1="520" x2="380" y2="500" class="edge-partial"/>

  <!-- Attributes: COST_ANALYSIS -->
  <ellipse cx="585" cy="440" rx="64" ry="17" class="attr"/>
  <text x="544" y="444" class="attrText"><tspan class="pk">cost_id</tspan> : UUID</text>
  <line x1="600" y1="456" x2="635" y2="470" class="edge-partial"/>

  <ellipse cx="805" cy="440" rx="74" ry="17" class="attr"/>
  <text x="752" y="444" class="attrText"><tspan class="fk">therapy_id (FK)</tspan> : UUID</text>
  <line x1="780" y1="456" x2="740" y2="470" class="edge-partial"/>

  <ellipse cx="870" cy="490" rx="82" ry="17" class="attr"/>
  <text x="816" y="494" class="attrText">therapy_cost : DECIMAL</text>
  <line x1="788" y1="490" x2="775" y2="490" class="edge-partial"/>

  <ellipse cx="875" cy="535" rx="88" ry="17" class="attr"/>
  <text x="813" y="539" class="attrText">benefit_value : DECIMAL</text>
  <line x1="787" y1="535" x2="775" y2="510" class="edge-partial"/>

  <ellipse cx="845" cy="575" rx="78" ry="17" class="attr"/>
  <text x="793" y="579" class="attrText">risk_value : DECIMAL</text>
  <line x1="770" y1="575" x2="748" y2="518" class="edge-partial"/>

  <ellipse cx="740" cy="610" rx="54" ry="17" class="attr"/>
  <text x="721" y="614" class="attrText">qaly</text>
  <line x1="725" y1="593" x2="705" y2="518" class="edge-partial"/>

  <ellipse cx="610" cy="620" rx="132" ry="18" class="attr"/>
  <text x="524" y="624" class="attrText">cost_effectiveness_ratio : DECIMAL</text>
  <line x1="610" y1="602" x2="665" y2="518" class="edge-partial"/>

  <!-- Legend -->
  <rect x="24" y="650" width="932" height="36" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" rx="6"/>
  <text x="38" y="665" class="legend">Chen notation: entities in rectangles, attributes in ellipses, relationships in diamonds.</text>
  <text x="38" y="680" class="legend">Underlined = PK | Blue bold = FK | Thick line = Total participation | Dashed line = Partial participation.</text>
</svg>
